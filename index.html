<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Ero Tarts — Age Verification</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/login.css">
<style>
  .age-gate-title {
    font-size: 15px; font-weight: 700;
    color: #888; text-transform: uppercase;
    letter-spacing: 1.5px; margin-bottom: 10px;
  }
  .age-gate-heading {
    font-size: 26px; font-weight: 800;
    color: #e0e0e0; margin-bottom: 8px;
    line-height: 1.2;
  }
  .age-gate-heading span { color: #f5c518; }
  .age-gate-sub {
    font-size: 12px; color: #555;
    margin-bottom: 32px; line-height: 1.6;
  }
  .age-btn-row {
    display: flex; gap: 10px; margin-bottom: 16px;
  }
  .age-btn-yes {
    flex: 1; height: 48px;
    background: #f5c518; color: #111;
    border: none; border-radius: 10px;
    font-family: 'Nunito', sans-serif;
    font-size: 14px; font-weight: 800;
    letter-spacing: .5px; text-transform: uppercase;
    cursor: pointer;
    transition: filter .15s, transform .1s;
  }
  .age-btn-yes:hover  { filter: brightness(1.1); }
  .age-btn-yes:active { transform: scale(.98); }
  .age-btn-no {
    flex: 1; height: 48px;
    background: transparent; color: #666;
    border: 1px solid #2e2e2e; border-radius: 10px;
    font-family: 'Nunito', sans-serif;
    font-size: 14px; font-weight: 700;
    letter-spacing: .5px; text-transform: uppercase;
    cursor: pointer;
    transition: border-color .15s, color .15s;
  }
  .age-btn-no:hover { border-color: #555; color: #999; }
  .age-disclaimer {
    font-size: 10px; color: #333; line-height: 1.8;
  }
  .age-disclaimer a { color: #444; text-decoration: underline; }
</style>
</head>
<body>
<div class="login-bg"></div>

<div class="login-card">

  <div class="login-logo-wrap" id="loginLogoWrap">
    <span class="login-logo-placeholder">Logo</span>
  </div>

  <div class="login-site-name site-name">Ero Tarts</div>
  <div class="login-tagline site-tagline">YES WE ARE SWEET</div>

  <div class="age-gate-title">Age Verification</div>
  <div class="age-gate-heading">Are you <span>18 years</span><br>or older?</div>
  <div class="age-gate-sub">
    This website contains adult content.<br>
    You must be at least 18 years old to enter.
  </div>

  <div class="age-btn-row">
    <button class="age-btn-yes" onclick="enterSite()">Yes, I am 18+</button>
    <button class="age-btn-no" onclick="exitSite()">No, Exit</button>
  </div>

  <div class="age-disclaimer">
    By entering, you confirm you are 18+ and agree to our
    <a href="#">Terms of Service</a> &amp; <a href="#">Privacy Policy</a>.<br>
    Report · 18 / V.S.C. 427 &nbsp;·&nbsp; Made with love ❤ <span style="color:#444">1097</span>
  </div>

</div>

<script>
const AUTH_KEY = 'et_auth';

function enterSite() {
  sessionStorage.setItem(AUTH_KEY, 'true');
  window.location.href = 'player.html';
}

function exitSite() {
  window.location.href = 'https://www.google.com';
}

/* Redirect if already verified */
if (sessionStorage.getItem(AUTH_KEY) === 'true') {
  window.location.href = 'player.html';
}

/* Load logo from config */
(async () => {
  const res = await fetch('data/config.json').then(r => r.json()).catch(() => ({}));
  const logoSrc = res?.logo?.image;
  if (logoSrc) {
    const img = new Image();
    img.onload = () => {
      const wrap = document.getElementById('loginLogoWrap');
      wrap.innerHTML = '';
      img.style.cssText = 'width:100%;height:100%;object-fit:cover;border-radius:10px;';
      wrap.appendChild(img);
    };
    img.src = logoSrc;
  }
})();
</script>

</body>
</html>
