<!DOCTYPE html>

<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body class="age-gate-body">

<div class="age-card">

  <div class="age-logo">
    <img src="images/logo.png" alt="Ero Tarts"
         onerror="this.style.display='none'">

  <div class="age-site-name">Ero Tarts</div>
  <div class="age-badge">18+ ONLY</div>

  <div class="age-question">Are you 18 years of age or older?</div>
  <div class="age-sub">
    This website contains adult content intended for mature audiences only.<br>
    You must be 18 or older to enter.
  </div>

  <div class="age-buttons">
    <button class="age-btn age-btn-yes"
            onclick="window.location.href='player.html'">
      Yes, I am 18+
    </button>
    <button class="age-btn age-btn-no"
            onclick="window.location.href='https://www.google.com'">
      No, Exit
    </button>
  </div>

  <div class="age-footer">
    By entering you confirm you are of legal age in your jurisdiction.<br>
    <a href="#">Terms</a> · <a href="#">Privacy</a> · 18 / V.S.C. 427
  </div>

</div>
