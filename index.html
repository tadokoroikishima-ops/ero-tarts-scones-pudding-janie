<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Age Verification</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="age-gate-body">

<div class="age-card">

  <!-- Logo -->

  <div class="age-logo" id="ageLogoWrap">
    <img src="images/logo.png" alt="logo" onerror="this.style.display='none'">
  </div>

  <!-- Site name (filled by JS) -->

  <div class="age-site-name" id="ageSiteName">Ero Tarts</div>
  <div class="age-badge">18+ ONLY</div>

  <!-- Question -->

  <div class="age-question">Are you 18 years of age or older?</div>
  <div class="age-sub">
    This website contains adult content intended for mature audiences only.<br>
    You must be 18 or older to enter.
  </div>

  <!-- Buttons -->

  <div class="age-buttons">
    <button class="age-btn age-btn-yes" id="btnYes">Yes, I am 18+</button>
    <button class="age-btn age-btn-no"  id="btnNo">No, Exit</button>
  </div>

  <!-- Footer -->

  <div class="age-footer">
    By entering you confirm you are of legal age in your jurisdiction.<br>
    <a href="#">Terms</a> · <a href="#">Privacy</a> · 18 / V.S.C. 427
  </div>
</div>

<script src="app.js"></script>

<script>
  /* 年齢認証ボタン処理 */
  document.getElementById('btnYes').addEventListener('click', () => {
    sessionStorage.setItem('ageVerified', '1');
    window.location.href = 'player.html';
  });

  document.getElementById('btnNo').addEventListener('click', () => {
    window.location.href = 'https://www.google.com';
  });

  /* ロゴだけ早期適用 */
  fetch('config.json')
    .then(r => r.json())
    .then(data => {
      if (data.siteTitle) {
        document.getElementById('ageSiteName').textContent = data.siteTitle;
        document.title = data.siteTitle + ' — Age Verification';
      }
      if (data.images && data.images.logo) {
        document.getElementById('ageLogoWrap').innerHTML =
          `<img src="${data.images.logo}" alt="logo">`;
      }
    });
</script>

</body>
</html>
